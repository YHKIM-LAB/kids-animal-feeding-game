<!doctype html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#fff4b8">
  <title>배고픈 동물에게 먹이를 주세요!</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <main class="game" aria-labelledby="game-title">
    <header class="top-bar">
      <h1 id="game-title">배고픈 동물에게 먹이를 주세요!</h1>
      <div class="star-counter" aria-label="모은 별 개수" aria-live="polite">
        <span aria-hidden="true">⭐</span>
        <span id="star-count">0</span>
      </div>
    </header>

    <section class="play-area" aria-label="동물 먹이주기 문제">
      <div id="animal-card" class="animal-card">
        <div class="picture-frame animal-picture" aria-hidden="true">
          <img id="animal-image" alt="" hidden>
          <span id="animal-emoji" class="placeholder-emoji"></span>
        </div>
        <p id="animal-prompt" class="animal-prompt"></p>
      </div>

      <div id="feedback" class="feedback" role="status" aria-live="assertive">
        먹이를 골라 주세요!
      </div>

      <div id="food-options" class="food-options" aria-label="먹이 선택지"></div>
    </section>
  </main>

  <div id="celebration" class="celebration" aria-hidden="true"></div>
  <script src="game.js"></script>
</body>
</html>
